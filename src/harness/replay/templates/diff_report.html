<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Diff matrix: $title</title>
<style>
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
         margin: 24px; color: #1d1d1f; }
  h1 { font-size: 20px; margin-bottom: 4px; }
  .subtitle { color: #6e6e73; font-size: 13px; margin-bottom: 16px; }
  table { border-collapse: collapse; width: 100%; }
  th, td { border: 1px solid #d2d2d7; padding: 8px 10px; text-align: left;
           vertical-align: top; font-size: 13px; }
  th { background: #f5f5f7; font-weight: 600; }
  td.case { font-weight: 600; white-space: nowrap; }
  td.consensus { background: #e6f4ea; }
  td.dissent { background: #fce8e6; }
  td.error { background: #f1f3f4; color: #5f6368; font-style: italic; }
  .legend { font-size: 12px; color: #6e6e73; margin-top: 12px; }
  .legend span { display: inline-block; padding: 2px 8px; margin-right: 8px;
                 border: 1px solid #d2d2d7; border-radius: 3px; }
  .legend .consensus { background: #e6f4ea; }
  .legend .dissent { background: #fce8e6; }
  .legend .error { background: #f1f3f4; }
  pre { white-space: pre-wrap; word-break: break-word; margin: 0;
        font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
        font-size: 12px; max-width: 360px; }
</style>
</head>
<body>
<h1>Diff matrix: $title</h1>
<p class="subtitle">$summary</p>
<table>
  <thead>
    <tr>
      <th>Case</th>
      $runner_headers
    </tr>
  </thead>
  <tbody>
    $rows
  </tbody>
</table>
<p class="legend">
  <span class="consensus">consensus</span>
  <span class="dissent">dissenting</span>
  <span class="error">errored</span>
</p>
</body>
</html>
